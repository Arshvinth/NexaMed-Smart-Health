version: "3.9"

services:
  api-gateway:
    build:
      context: ../../services/api-gateway
    container_name: shp-api-gateway
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      PORT: "5000"
      NODE_ENV: "production"
      CORS_ORIGIN: "http://localhost:3000"
      DOCTOR_SERVICE_URL: "http://doctor-service:5002"
      TELEMEDICINE_SERVICE_URL: "http://telemedicine-service:5005"
    depends_on:
      - doctor-service
      - telemedicine-service

  mongo:
    image: mongo:7
    container_name: shp-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  doctor-service:
    build:
      context: ../../services/doctor-service
    container_name: shp-doctor-service
    restart: unless-stopped
    environment:
      PORT: "5002"
      NODE_ENV: "production"
      AUTH_MODE: "dev"
      MONGODB_URI: ${MONGODB_URI:-mongodb://mongo:27017/doctor_service}
      CORS_ORIGIN: "http://localhost:3000"
    depends_on:
      - mongo
    
  telemedicine-service:
    build:
      context: ../../services/telemedicine-service
    container_name: shp-telemedicine-service
    restart: unless-stopped
    environment:
      PORT: "5005"
      NODE_ENV: "production"
      AUTH_MODE: "dev"
      CORS_ORIGIN: "http://localhost:3000"

volumes:
  mongo_data: