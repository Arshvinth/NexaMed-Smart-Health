apiVersion: apps/v1
kind: Deployment
metadata:
  name: appointment-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: appointment-service
  template:
    metadata:
      labels:
        app: appointment-service
    spec:
      containers:
        - name: appointment-service
          image: appointment-service:local
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5003
          env:
            - name: PORT
              value: "5003"
            - name: NODE_ENV
              value: "production"
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: jwt-secret
                  key: secret
            - name: INTERNAL_API_SECRET
              valueFrom:
                secretKeyRef:
                  name: internal-secret
                  key: secret
            - name: MONGODB_URI
              value: "mongodb://mongo:27017/appointment_service"
            - name: CORS_ORIGIN
              value: "http://localhost:3000"
            - name: DOCTOR_SERVICE_URL
              value: "http://doctor-service:5002"
            - name: TELEMEDICINE_SERVICE_URL
              value: "http://telemedicine-service:5005"
          readinessProbe:
            httpGet:
              path: /health
              port: 5003
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 5003
            initialDelaySeconds: 10
            periodSeconds: 20
