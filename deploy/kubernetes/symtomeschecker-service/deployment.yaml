apiVersion: apps/v1
kind: Deployment
metadata:
  name: symtomeschecker-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: symtomeschecker-service
  template:
    metadata:
      labels:
        app: symtomeschecker-service
    spec:
      containers:
        - name: symtomeschecker-service
          image: symtomeschecker-service:local
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          readinessProbe:
            httpGet:
              path: /
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 20
